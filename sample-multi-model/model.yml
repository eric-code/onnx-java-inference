name: sample-multi-model
version: "1.0"
description: BiDAF 阅读理解模型（4 个 string 输入，2 个 int32 输出）

preprocess:
  - step: parse_json
  - step: to_tensor
    params: { field: context_word }
  - step: to_tensor
    params: { field: context_char }
  - step: to_tensor
    params: { field: query_word }
  - step: to_tensor
    params: { field: query_char }

postprocess:
  - step: round
    params: { field: start_pos, decimals: 0 }
  - step: round
    params: { field: end_pos, decimals: 0 }
