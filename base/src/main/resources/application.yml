server:
  port: 8080

inference:
  model-dir: /models
  thread-count: ${INFERENCE_THREAD_COUNT:4}
  model-sources: ${MODEL_SOURCES}
  s3:
    enabled: ${S3_ENABLED:false}
    endpoint: ${S3_ENDPOINT:}
    region: ${S3_REGION:us-east-1}
    bucket: ${S3_BUCKET:}
    access-key: ${S3_ACCESS_KEY:}
    secret-key: ${S3_SECRET_KEY:}
    path-style-access: ${S3_PATH_STYLE_ACCESS:false}

host-proc:
  base-path: ${HOST_PROC_PATH:/host/proc}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState, model
