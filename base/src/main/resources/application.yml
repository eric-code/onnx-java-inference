server:
  port: 8080
  shutdown: graceful
  undertow:
    max-http-post-size: ${MAX_REQUEST_SIZE:50MB}

spring:
  lifecycle:
    timeout-per-shutdown-phase: ${SHUTDOWN_TIMEOUT:30s}

inference:
  model-dir: /models
  thread-count: ${INFERENCE_THREAD_COUNT:4}
  model-sources: ${MODEL_SOURCES}
  max-concurrent-inferences: ${MAX_CONCURRENT_INFERENCES:4}
  download-timeout: ${DOWNLOAD_TIMEOUT:5m}
  download-retry-count: ${DOWNLOAD_RETRY_COUNT:2}
  download-retry-delay: ${DOWNLOAD_RETRY_DELAY:3s}
  inference-timeout: ${INFERENCE_TIMEOUT:60s}

  s3:
    enabled: ${S3_ENABLED:false}
    endpoint: ${S3_ENDPOINT:}
    region: ${S3_REGION:us-east-1}
    bucket: ${S3_BUCKET:}
    access-key: ${S3_ACCESS_KEY:}
    secret-key: ${S3_SECRET_KEY:}
    path-style-access: ${S3_PATH_STYLE_ACCESS:false}

host-proc:
  base-path: ${HOST_PROC_PATH:/host/proc}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState, model
